<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zipsessory — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --pink: #FF2D6B; --black: #080808; --white: #FFFFFF; --muted: rgba(255,255,255,0.52); --serif: 'Cormorant Garamond', Georgia, serif; --sans: 'Jost', sans-serif; }
    html, body { height: 100%; background: var(--black); color: var(--white); font-family: var(--sans); font-weight: 300; overflow: hidden; }
    body::after { content: ''; position: fixed; top: 40%; left: 50%; transform: translate(-50%,-50%); width: 600px; height: 600px; background: radial-gradient(ellipse at center, rgba(255,45,107,0.06) 0%, transparent 70%); pointer-events: none; z-index: 0; }
    .page { position: relative; z-index: 1; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
    .zipper-chain { position: absolute; top: 0; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; opacity: 0; animation: fadeDown 1s ease forwards 0.2s; }
    .chain-line { width: 1px; height: 52px; background: linear-gradient(to bottom, transparent, rgba(255,45,107,0.6)); }
    .zipper-pull { width: 8px; height: 8px; background: var(--pink); transform: rotate(45deg); box-shadow: 0 0 10px var(--pink), 0 0 22px rgba(255,45,107,0.4); animation: pulse 2.8s ease-in-out infinite 1.5s; }
    .chain-line-bottom { width: 1px; height: 28px; background: linear-gradient(to bottom, rgba(255,45,107,0.6), transparent); }
    .logo { font-family: var(--serif); font-style: italic; font-weight: 300; font-size: clamp(2.8rem, 9vw, 5.5rem); letter-spacing: 0.12em; line-height: 1; color: var(--white); opacity: 0; animation: fadeUp 1s ease forwards 0.55s; }
    .logo em { color: var(--pink); font-style: inherit; }
    .tagline { margin-top: 0.5rem; font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); opacity: 0; animation: fadeUp 1s ease forwards 0.75s; }
    .divider { display: inline-flex; align-items: center; gap: 0.65rem; font-size: 0.6rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--pink); margin: 2.4rem 0 2rem; opacity: 0; animation: fadeUp 1s ease forwards 0.95s; }
    .divider::before, .divider::after { content: ''; width: 28px; height: 1px; background: var(--pink); }
    .headline { font-family: var(--serif); font-style: italic; font-weight: 300; font-size: clamp(1.6rem,5vw,2.6rem); letter-spacing: 0.02em; line-height: 1.3; color: var(--white); max-width: 500px; opacity: 0; animation: fadeUp 1s ease forwards 1.1s; }
    .headline em { color: var(--pink); font-style: inherit; }
    .sub { margin-top: 1rem; font-size: clamp(0.78rem,2vw,0.86rem); letter-spacing: 0.06em; color: var(--muted); max-width: 360px; line-height: 1.8; opacity: 0; animation: fadeUp 1s ease forwards 1.25s; }
    .contact { margin-top: 2.6rem; opacity: 0; animation: fadeUp 1s ease forwards 1.4s; }
    .contact a { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--pink); text-decoration: none; font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase; border-bottom: 1px solid rgba(255,45,107,0.35); padding-bottom: 3px; transition: border-color 0.25s, opacity 0.25s; }
    .contact a:hover { opacity: 0.75; border-color: var(--pink); }
    .footer { position: absolute; bottom: 1.8rem; font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.2); opacity: 0; animation: fadeUp 1s ease forwards 1.6s; }
    .corner { position: fixed; width: 18px; height: 18px; opacity: 0.3; }
    .corner.tl { top: 1.4rem; left: 1.4rem; border-top: 1px solid var(--pink); border-left: 1px solid var(--pink); }
    .corner.tr { top: 1.4rem; right: 1.4rem; border-top: 1px solid var(--pink); border-right: 1px solid var(--pink); }
    .corner.bl { bottom: 1.4rem; left: 1.4rem; border-bottom: 1px solid var(--pink); border-left: 1px solid var(--pink); }
    .corner.br { bottom: 1.4rem; right: 1.4rem; border-bottom: 1px solid var(--pink); border-right: 1px solid var(--pink); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeDown { from { opacity: 0; transform: translateX(-50%) translateY(-8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    @keyframes pulse { 0%, 100% { box-shadow: 0 0 8px var(--pink), 0 0 18px rgba(255,45,107,0.3); } 50% { box-shadow: 0 0 14px var(--pink), 0 0 36px rgba(255,45,107,0.65), 0 0 55px rgba(255,45,107,0.15); } }
  </style>
</head>
<body>
  <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
  <div class="page">
    <div class="zipper-chain"><div class="chain-line"></div><div class="zipper-pull"></div><div class="chain-line-bottom"></div></div>
    <div class="logo">Zip<em>sessory</em></div>
    <div class="tagline">Zipper Jewellery</div>
    <div class="divider">Coming Soon</div>
    <div class="headline">Something <em>sparkling</em> is on its way.</div>
    <div class="sub">Our new website is launching soon. In the meantime, Shelley would love to hear from you.</div>
    <div class="contact"><a href="mailto:shelley@zipsessory.com">&#x2709;&nbsp; shelley@zipsessory.com</a></div>
    <div class="footer">Patent Pending &nbsp;&middot;&nbsp; Handmade in Canada &nbsp;&middot;&nbsp; &copy; 2025 Zipsessory</div>
  </div>
</body>
</html>
